<!DOCTYPE html>
<html>
<head>
  <title>Naval Command</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="anchor">
      <span>NAVAL COMMAND</span>
    </div>

    <button id="restart-btn">Restart</button>
  </header>

  <main>
    <section id="setup" class="screen active">
      <h1>SETUP</h1>

      <p id="status">Place your fleet to begin.</p>

      <div class="controls">
        <button id="random-place-btn">Random Place</button>
        <button id="rotate-btn">Rotate</button>
        <button id="start-btn">Start Game</button>
      </div>

      <div class="battle-layout">
        <div>
          <h2>YOUR BOARD</h2>
          <div id="player-board" class="grid"></div>
        </div>

        <div>
          <h2>ENEMY BOARD</h2>
          <div id="computer-board" class="grid"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
